<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MK School Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
}

.login-card{
    max-width:450px;
    margin:100px auto;
    border:none;
    border-radius:15px;
}

.card-header{
    background:#0b2d5c;
    color:white;
    text-align:center;
    font-weight:bold;
    padding:20px;
}

.btn-login{
    background:#0b2d5c;
    color:white;
}

.btn-login:hover{
    background:#123f7a;
    color:white;
}
</style>

</head>

<body>

<div class="container">

<div class="card login-card shadow">

<div class="card-header">
MANISH KUMAR SCHOOL<br>
Admin Login
</div>

<div class="card-body">

<div class="mb-3">
<label>Email</label>
<input
type="email"
id="email"
class="form-control"
placeholder="Enter Admin Email">
</div>

<div class="mb-3">
<label>Password</label>
<input
type="password"
id="password"
class="form-control"
placeholder="Enter Password">
</div>

<button
id="loginBtn"
class="btn btn-login w-100">

Login

</button>

<div class="mt-3 text-center">
<small>
Authorized Admin Access Only
</small>
</div>

</div>

</div>

</div>

<script type="module">

import { auth } from "../js/firebase-config.js";

import {
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

document
.getElementById("loginBtn")
.addEventListener("click", async () => {

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try {

await signInWithEmailAndPassword(
auth,
email,
password
);

alert("Login Successful");

window.location.href =
"dashboard.html";

}
catch(error){

alert(error.message);

}

});

</script>

</body>
</html>
