<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MK School Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

<div class="container">

<span class="navbar-brand">

MK School Admin Panel

</span>

</div>

</nav>

<div class="container mt-5">

<!-- ADD NOTICE -->

<div class="row">

<div class="col-md-6">

<div class="card shadow p-4">

<h4>Add Notice</h4>

<input
id="notice"
class="form-control mb-3"
placeholder="Write Notice">

<button
id="saveNotice"
class="btn btn-success">

Save Notice

</button>

</div>

</div>

</div>

<!-- ADMISSIONS -->

<hr class="my-5">

<h2>Admission Enquiries</h2>

<div class="table-responsive">

<table class="table table-bordered table-striped">

<thead>

<tr>
<th>Name</th>
<th>Mobile</th>
<th>Email</th>
<th>Course</th>
<th>Query</th>
<th>Action</th>
</tr>

</thead>

<tbody id="admissionsTable">

<tr>
<td colspan="6">
Loading Admissions...
</td>
</tr>

</tbody>

</table>

</div>

<!-- NOTICES -->

<hr class="my-5">

<h2>Manage Notices</h2>

<div class="table-responsive">

<table class="table table-bordered table-striped">

<thead>

<tr>
<th>Notice</th>
<th>Action</th>
</tr>

</thead>

<tbody id="noticesTable">

<tr>
<td colspan="2">
Loading Notices...
</td>
</tr>

</tbody>

</table>

</div>

</div>

<script type="module">

import { db }
from "../js/firebase-config.js";

import {
collection,
addDoc,
getDocs,
query,
orderBy,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ======================================
// SAVE NOTICE
// ======================================

document
.getElementById("saveNotice")
.addEventListener("click", async ()=>{

const notice =
document.getElementById("notice").value.trim();

if(!notice){

alert("Please enter a notice");

return;

}

try{

await addDoc(
collection(db,"notices"),
{
notice,
createdAt:new Date()
}
);

document.getElementById("notice").value="";

alert("Notice Saved");

loadNotices();

}catch(error){

console.error(error);

alert("Failed to save notice");

}

});

// ======================================
// LOAD ADMISSIONS
// ======================================

async function loadAdmissions(){

const table =
document.getElementById("admissionsTable");

table.innerHTML =
"<tr><td colspan='6'>Loading...</td></tr>";

try{

const q =
query(
collection(db,"admissions"),
orderBy("createdAt","desc")
);

const snapshot =
await getDocs(q);

table.innerHTML = "";

if(snapshot.empty){

table.innerHTML =
"<tr><td colspan='6'>No Admissions Found</td></tr>";

return;

}

snapshot.forEach((admissionDoc)=>{

const data =
admissionDoc.data();

table.innerHTML += `
<tr>
<td>${data.studentName || ""}</td>
<td>${data.mobileNumber || ""}</td>
<td>${data.emailAddress || ""}</td>
<td>${data.course || ""}</td>
<td>${data.studentQuery || ""}</td>
<td>
<button
class="btn btn-danger btn-sm deleteAdmission"
data-id="${admissionDoc.id}">
Delete
</button>
</td>
</tr>
`;

});

}catch(error){

console.error(error);

table.innerHTML =
"<tr><td colspan='6'>Error Loading Admissions</td></tr>";

}

}

// ======================================
// LOAD NOTICES
// ======================================

async function loadNotices(){

const table =
document.getElementById("noticesTable");

table.innerHTML =
"<tr><td colspan='2'>Loading...</td></tr>";

try{

const q =
query(
collection(db,"notices"),
orderBy("createdAt","desc")
);

const snapshot =
await getDocs(q);

table.innerHTML = "";

if(snapshot.empty){

table.innerHTML =
"<tr><td colspan='2'>No Notices Found</td></tr>";

return;

}

snapshot.forEach((noticeDoc)=>{

const data =
noticeDoc.data();

table.innerHTML += `
<tr>
<td>${data.notice || ""}</td>
<td>
<button
class="btn btn-danger btn-sm deleteNotice"
data-id="${noticeDoc.id}">
Delete
</button>
</td>
</tr>
`;

});

}catch(error){

console.error(error);

table.innerHTML =
"<tr><td colspan='2'>Error Loading Notices</td></tr>";

}

}

// ======================================
// DELETE ADMISSION
// ======================================

document.addEventListener("click", async (e)=>{

if(e.target.classList.contains("deleteAdmission")){

const id =
e.target.getAttribute("data-id");

if(!confirm("Delete this admission enquiry?")) return;

try{

await deleteDoc(
doc(db,"admissions",id)
);

alert("Admission Deleted");

loadAdmissions();

}catch(error){

console.error(error);

alert("Delete Failed");

}

}

});

// ======================================
// DELETE NOTICE
// ======================================

document.addEventListener("click", async (e)=>{

if(e.target.classList.contains("deleteNotice")){

const id =
e.target.getAttribute("data-id");

if(!confirm("Delete this notice?")) return;

try{

await deleteDoc(
doc(db,"notices",id)
);

alert("Notice Deleted");

loadNotices();

}catch(error){

console.error(error);

alert("Delete Failed");

}

}

});

// ======================================

loadAdmissions();

loadNotices();

// ======================================

</script>

</body>

</html>
