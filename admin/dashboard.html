<!DOCTYPE html>

<html>

<head>

<title>MK School Admin Dashboard</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">
<div class="container">
<span class="navbar-brand">
MK School Admin Panel
</span>
</div>
</nav>

<div class="container mt-5">

<div class="row">

<div class="col-md-6">

<div class="card p-4 shadow">

<h4>Add Notice</h4>

<input
id="notice"
class="form-control mb-3"
placeholder="Write Notice">

<button
id="saveNotice"
class="btn btn-success">

Save Notice

</button>

</div>

</div>

</div>

<hr class="my-5">

<h2>Admission Enquiries</h2>

<div class="table-responsive">

<table class="table table-bordered table-striped">

<thead>

<tr>
<th>Name</th>
<th>Mobile</th>
<th>Email</th>
<th>Course</th>
<th>Query</th>
<th>Action</th>
</tr>

</thead>

<tbody id="admissionsTable">

<tr>
<td colspan="6">
Loading Admissions...
</td>
</tr>

</tbody>

</table>

</div>

</div>

<script type="module">

import { db }
from "../js/firebase-config.js";

import {
collection,
addDoc,
getDocs,
query,
orderBy,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ======================
// SAVE NOTICE
// ======================

document
.getElementById("saveNotice")
.addEventListener("click", async ()=>{

const notice =
document.getElementById("notice").value;

if(!notice){

alert("Please enter a notice");

return;

}

await addDoc(
collection(db,"notices"),
{
notice,
createdAt:new Date()
}
);

document.getElementById("notice").value="";

alert("Notice Saved");

});

// ======================
// LOAD ADMISSIONS
// ======================

async function loadAdmissions(){

const table =
document.getElementById("admissionsTable");

table.innerHTML =
"<tr><td colspan='6'>Loading...</td></tr>";

try{

const q =
query(
collection(db,"admissions"),
orderBy("createdAt","desc")
);

const snapshot =
await getDocs(q);

table.innerHTML = "";

if(snapshot.empty){

table.innerHTML =
"<tr><td colspan='6'>No Admissions Found</td></tr>";

return;

}

snapshot.forEach((admissionDoc)=>{

const data = admissionDoc.data();

table.innerHTML += `
<tr>
<td>${data.studentName || ""}</td>
<td>${data.mobileNumber || ""}</td>
<td>${data.emailAddress || ""}</td>
<td>${data.course || ""}</td>
<td>${data.studentQuery || ""}</td>
<td>
<button
class="btn btn-danger btn-sm deleteAdmission"
data-id="${admissionDoc.id}">
Delete
</button>
</td>
</tr>
`;

});

}catch(error){

console.error(error);

table.innerHTML =
"<tr><td colspan='6'>Error Loading Admissions</td></tr>";

}

}

loadAdmissions();

// ======================
// DELETE ADMISSION
// ======================

document.addEventListener("click", async (e)=>{

if(e.target.classList.contains("deleteAdmission")){

const id =
e.target.getAttribute("data-id");

const confirmDelete =
confirm("Delete this admission enquiry?");

if(!confirmDelete) return;

try{

await deleteDoc(
doc(db,"admissions",id)
);

alert("Admission Deleted");

loadAdmissions();

}catch(error){

console.error(error);

alert("Delete Failed");

}

}

});

</script>

</body>

</html>
